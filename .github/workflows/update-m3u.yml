name: Update YouTube M3U Playlist

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      # Utiliser la v4
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      # Utiliser la v5
      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Installation des dépendances (yt-dlp)
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Exécution du script de mise à jour
        run: python update_playlist.py

      - name: Commit et Push des modifications
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u
          git diff --staged --quiet || (git commit -m "Auto-update playlist.m3u [skip ci]" && git push)
