# This is a basic workflow to help you get started with Actions

name: M3U generator

# Controls when the action will run. 
on:
  schedule:
    - cron: '0 */4 * * *' # S'exécute toutes les 4 heures

  pull_request:
    branches:
      - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build:
    runs-on: ubuntu-latest

    # Donne explicitement les droits d'écriture au jeton GitHub (Sécurité)
    permissions:
      contents: write

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE
      - name: Checkout du dépôt
        uses: actions/checkout@v5

      - name: Configuration de Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      # Exécution directe du script (plus fiable que de passer par autorun.sh)
      - name: Exécution du script de récupération
        run: |
          python scripts/youtube_m3ugrabber.py

      - name: Vérification et Commit des modifications
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Ajoute absolument tout, y compris les nouveaux fichiers du dossier Stream
          git add youtube.m3u Stream/
          
          # Vérifie s'il y a des changements réels mis en mémoire (staged)
          if git diff --cached --quiet; then
            echo "Aucune modification détectée. Fin du workflow."
          else
            echo "Modifications détectées. Envoi des mises à jour..."
            git commit -m "Mise à jour automatique des liens M3U [skip ci]"
            git push origin main
          fi
