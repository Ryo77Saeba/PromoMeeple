name: Update YouTube M3U Playlist

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v5

      - name: Configuration de Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Générer les liens individuels
        run: python update_playlist.py

      - name: Commit et Push des modifications
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Stream/*.m3u8
          git diff --staged --quiet || (git commit -m "Auto-update individual channel streams" && git push)
